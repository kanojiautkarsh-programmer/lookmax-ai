# LookMax AI - Cloudflare Worker Configuration
# https://developers.cloudflare.com/workers/

name = "lookmax-ai"
main = "index.js"
compatibility_date = "2024-01-01"

# Account ID - Set via `wrangler secret put CLOUDFLARE_ACCOUNT_ID`
# Or set in dashboard

# AI Gateway binding (optional, for caching/rate limiting)
# [[ai_gateways]]
# binding = "AI_GATEWAY"
# gateway_id = "your-gateway-id"

# KV Namespace for caching (optional)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# Enable AI binding (automatic with Workers AI)
ai = { binding = "AI" }

# Rate limiting (via Cloudflare's built-in rate limiting)
# See: https://developers.cloudflare.com/rate-limiting/

[observability]
enabled = true
